# vuln-research-mcp v5.0 配置文件
# 优先级: 命令行参数 > 环境变量 > 本文件 > 默认值
# 放置位置: ~/.vuln-research-mcp/config.yaml

server:
  name: vuln-research-mcp
  log_level: INFO       # DEBUG | INFO | WARNING | ERROR
  log_format: text      # text | json

api_keys:
  nvd: ""               # 或设置环境变量 NVD_API_KEY
  github: ""             # 或设置环境变量 GITHUB_TOKEN
  shodan: ""             # 或设置环境变量 SHODAN_API_KEY

# v5.0 安全配置 (完整企业级安全体系)
security:
  # 工具审批策略
  approval:
    enabled: true
    default_deny_levels: [exploit, system]    # 默认拒绝 漏洞利用/系统级 工具
    require_approval_levels: [active_scan]     # 主动扫描需审批
    auto_approve_tools:                        # 自动通过工具列表
      - search_cve
      - get_cve_details
      - cvss_calculator
      - cwe_mapping
      - graph_traverse
      - graph_search
      - graph_stats
      - cnvd_search
      - cnvd_detail
      - cve_to_cnvd
      - compliance_check
    approval_timeout_seconds: 30               # 审批超时时间

  # 工具风险控制
  max_risk_level: system     # read_only|network_info|active_scan|exploit|system

  # 审计日志
  audit_enabled: true
  audit_dir: ""              # 默认 ~/.vuln-research-mcp/audit

  # 目标策略 (内网防护)
  target_whitelist_enabled: false
  target_whitelist_file: ""  # JSON 文件路径
  block_private_networks: true       # 禁止 10/172/192/127 内网段
  block_cloud_metadata: true         # 禁止云元数据地址 (169.254.169.254)

  # 日志脱敏
  log_redaction: true

  # SSRF 防护
  ssrf_protection: true

  # 外部数据清洗 (防间接提示注入)
  data_sanitization: true

  # 数据库加密
  db_encryption: true
  db_master_key_env: VULNRESEARCH_DB_KEY   # 环境变量名

  # 扫描限制
  scan:
    max_concurrent: 3
    max_targets_per_scan: 50
    max_ports_per_scan: 100
    cooldown_seconds: 30
    daily_limit: 100
    timeout_seconds: 300

# v5.0 API 认证
api_auth:
  enabled: false            # 启用 API Bearer Token 认证
  jwt_secret_env: VULNRESEARCH_API_SECRET

# v5.0 告警系统
alerting:
  dingtalk_webhook: ""      # 或设置 VULNRESEARCH_DINGTALK_WEBHOOK
  smtp_host: ""             # 或设置 VULNRESEARCH_SMTP_HOST
  smtp_port: 587
  email_from: ""
  email_to: ""
  syslog_host: ""           # SIEM syslog 服务器

# v5.0 国内漏洞库
cn_vulnerabilities:
  cnvd_enabled: true
  cnnvd_enabled: true
  cnvd_cache_ttl: 3600      # CNVD 缓存时间(秒)

# v5.0 离线镜像
offline_mirror:
  enabled: true
  mirror_dir: ~/.vuln-research-mcp/mirror
  nvd_years: 10             # 下载最近N年的NVD数据
  kev_enabled: true
  epss_enabled: true
  exploit_db_enabled: true

# v5.0 Neo4j 知识图谱 (可选)
neo4j:
  enabled: false            # 默认使用 NetworkX, 大规模部署启用 Neo4j
  uri: bolt://localhost:7687
  user: neo4j
  # password 通过环境变量 NEO4J_PASSWORD 设置
  database: neo4j

tools:
  disabled: []              # ["scan_ports"] 按需禁用

rate_limit:
  nvd_requests_per_window: 5
  nvd_window_seconds: 30
  nvd_max_retries: 3

cache:
  enabled: true
  directory: ~/.vuln-research-mcp/cache
  max_size_mb: 200

circuit_breaker:
  nvd_failure_threshold: 5
  nvd_recovery_seconds: 60
  cisa_failure_threshold: 3
  cisa_recovery_seconds: 60
  epss_failure_threshold: 3
  epss_recovery_seconds: 60
