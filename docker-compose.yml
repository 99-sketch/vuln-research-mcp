# docker-compose.yml — vuln-research-mcp 一键部署
version: "3.8"

services:
  vuln-research-mcp:
    build: .
    container_name: vuln-research-mcp
    restart: unless-stopped
    environment:
      - NVD_API_KEY=${NVD_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
    volumes:
      - mcp-cache:/root/.vuln-research-mcp/cache
      - mcp-config:/root/.vuln-research-mcp
    stdin_open: true
    tty: true

volumes:
  mcp-cache:
  mcp-config:
